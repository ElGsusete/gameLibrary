<svg xmlns="http://www.w3.org/2000/svg" width="160" height="600" viewBox="0 0 160 600">
  <defs>
    <linearGradient id="bgR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="30%" style="stop-color:#0d0a18"/>
      <stop offset="60%" style="stop-color:#1e0a30"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </linearGradient>
    <linearGradient id="neonR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="50%" style="stop-color:#22d3c7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accentR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glowR" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotsR" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1" fill="#00f5d4" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="160" height="600" fill="url(#bgR)"/>
  <rect width="160" height="600" fill="url(#accentR)"/>
  <rect width="160" height="600" fill="url(#dotsR)"/>
  <!-- Diagonal stripe opposite -->
  <path d="M 160 0 L 80 600 L 0 600 L 80 0 Z" fill="url(#neonR)" opacity="0.14"/>
  <!-- Right accent bar -->
  <rect x="155" y="0" width="5" height="600" fill="url(#neonR)" opacity="0.9"/>
  <!-- HOT badge -->
  <rect x="35" y="200" width="90" height="28" rx="4" fill="#7c3aed" opacity="0.25" stroke="#00f5d4" stroke-width="1"/>
  <text x="80" y="219" text-anchor="middle" fill="#00f5d4" font-family="system-ui,sans-serif" font-size="12" font-weight="800" letter-spacing="1" filter="url(#glowR)">★ OFERTAS ★</text>
  <text x="80" y="265" text-anchor="middle" fill="#a78bfa" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Novedades y descuentos</text>
  <!-- Zigzag / lightning feel -->
  <path d="M 40 340 L 80 380 L 40 420 L 80 460 L 50 500" fill="none" stroke="#00f5d4" stroke-width="1.2" opacity="0.35" stroke-linecap="round"/>
  <text x="80" y="445" text-anchor="middle" fill="#00f5d4" font-family="system-ui,sans-serif" font-size="13" font-weight="800">PLAY HERE</text>
  <!-- Bottom pill -->
  <rect x="25" y="535" width="110" height="34" rx="17" fill="none" stroke="#00f5d4" stroke-width="1.5" opacity="0.8"/>
  <text x="80" y="557" text-anchor="middle" fill="#00f5d4" font-family="system-ui,sans-serif" font-size="10" font-weight="700">VER MÁS</text>
</svg>
