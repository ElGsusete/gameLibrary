<svg xmlns="http://www.w3.org/2000/svg" width="160" height="600" viewBox="0 0 160 600">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="25%" style="stop-color:#0f0e1a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="75%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#050508"/>
    </linearGradient>
    <linearGradient id="neonL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#00b4a0"/>
    </linearGradient>
    <linearGradient id="purpleL" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glowL" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridL" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00f5d4" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="160" height="600" fill="url(#bgL)"/>
  <rect width="160" height="600" fill="url(#purpleL)"/>
  <rect width="160" height="600" fill="url(#gridL)"/>
  <!-- Diagonal stripe -->
  <path d="M 0 0 L 80 600 L 160 600 L 80 0 Z" fill="url(#neonL)" opacity="0.12"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="5" height="600" fill="url(#neonL)" opacity="0.9"/>
  <!-- Badge -->
  <rect x="20" y="220" width="120" height="36" rx="4" fill="#00f5d4" opacity="0.15" stroke="#00f5d4" stroke-width="1.5"/>
  <text x="80" y="242" text-anchor="middle" fill="#00f5d4" font-family="system-ui,sans-serif" font-size="14" font-weight="800" letter-spacing="2" filter="url(#glowL)">GAME ZONE</text>
  <text x="80" y="290" text-anchor="middle" fill="#00f5d4" font-family="system-ui,sans-serif" font-size="10" opacity="0.9">Tu espacio gamer</text>
  <!-- Decorative circles -->
  <circle cx="80" cy="380" r="25" fill="none" stroke="#00f5d4" stroke-width="1" opacity="0.4"/>
  <circle cx="80" cy="380" r="18" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.5"/>
  <text x="80" y="385" text-anchor="middle" fill="#00f5d4" font-family="system-ui,sans-serif" font-size="11" font-weight="700">PLAY</text>
  <!-- Bottom CTA -->
  <rect x="30" y="520" width="100" height="32" rx="16" fill="#00f5d4" opacity="0.2" stroke="#00f5d4" stroke-width="1"/>
  <text x="80" y="541" text-anchor="middle" fill="#00f5d4" font-family="system-ui,sans-serif" font-size="10" font-weight="700">ENTRAR</text>
</svg>
